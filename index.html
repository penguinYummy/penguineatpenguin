<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>히라가나어 외우기</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #f8f9fa;
            --white: #ffffff;
            --text: #2d3436;
            --success: #00b894;
            --error: #d63031;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--white);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 480px;
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .score-text { font-size: 1.2rem; font-weight: bold; color: var(--primary); }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--secondary);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: var(--primary); transform: translateY(-2px); }

        #quiz-area, #result-area { display: none; }

        #char-display {
            font-size: 7.5rem;
            margin: 20px 0;
            font-weight: bold;
            color: var(--text);
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="text"] {
            width: 85%;
            padding: 15px;
            border: 3px solid #eee;
            border-radius: 15px;
            font-size: 1.5rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        #feedback {
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 2rem;
            margin-bottom: 20px;
            display: block; /* 가시성 확보 */
        }

        .action-btn { background: var(--primary); width: 100%; margin-top: 10px; }

        .result-title { font-size: 1.8rem; margin-bottom: 20px; color: var(--text); }
        .progress { font-size: 0.9rem; color: #999; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-menu">
        <h1 style="color: var(--primary); margin-top: 0;">히라가나어 외우기</h1>
        <p>학습할 유형 선택</p>
        <div class="menu-grid">
            <button onclick="startQuiz('seion')">청음 (46자)</button>
            <button onclick="startQuiz('takuon')">탁음 (20자)</button>
            <button onclick="startQuiz('hantakuon')">반탁음 (5자)</button>
            <button onclick="startQuiz('youm')">요음 (33자)</button>
        </div>
    </div>

    <div id="quiz-area">
        <div class="header">
            <span id="quiz-type-name" style="font-weight: bold; color: #666;">퀴즈 진행 중</span>
            <div class="score-text">맞춘 개수: <span id="score">0</span></div>
        </div>
        <div class="progress"><span id="current-idx-display">1</span> / <span id="total-idx-display">?</span></div>
        <div id="char-display">?</div>
        <input type="text" id="answer-input" placeholder="발음 입력 (한글)" autocomplete="off">
        <div id="feedback"></div>
        <button id="next-btn" class="action-btn" style="display:none;" onclick="handleNext()">다음 문제 (Enter)</button>
    </div>

    <div id="result-area">
        <div class="result-title">학습 완료</div>
        <p style="font-size: 1.2rem;">최종 점수: <span id="final-score" style="font-weight:bold; color:var(--primary);">0</span></p>
        <button class="action-btn" onclick="resetGame()">다시하기 (처음으로)</button>
    </div>
</div>

<script>
    const data = {
        seion: {
            "あ": "아", "い": "이", "う": "우", "え": "에", "お": "오",
            "か": "카", "き": "키", "く": "쿠", "け": "케", "こ": "코",
            "さ": "사", "し": "시", "す": "스", "せ": "세", "そ": "소",
            "た": "타", "ち": "치", "つ": "츠", "て": "테", "と": "토",
            "な": "나", "に": "니", "ぬ": "누", "ね": "네", "の": "노",
            "は": "하", "ひ": "히", "ふ": "후", "へ": "헤", "ほ": "호",
            "ま": "마", "み": "미", "む": "무", "め": "메", "も": "모",
            "や": "야", "ゆ": "유", "よ": "요",
            "ら": "라", "り": "리", "る": "루", "れ": "레", "ろ": "로",
            "わ": "와", "を": "오", "ん": "응"
        },
        takuon: {
            "が": "가", "ぎ": "기", "ぐ": "구", "げ": "게", "ご": "고",
            "ざ": "자", "じ": "지", "ず": "즈", "ぜ": "제", "ぞ": "조",
            "だ": "다", "ぢ": "지", "づ": "즈", "で": "데", "ど": "도",
            "ば": "바", "び": "비", "ぶ": "부", "べ": "베", "ぼ": "보"
        },
        hantakuon: {
            "ぱ": "파", "ぴ": "피", "ぷ": "푸", "ぺ": "페", "ぽ": "포"
        },
        youm: {
            "きゃ": "캬", "きゅ": "큐", "きょ": "쿄",
            "しゃ": "샤", "しゅ": "슈", "しょ": "쇼",
            "ちゃ": "챠", "ちゅ": "츄", "ちょ": "쵸",
            "にゃ": "냐", "にゅ": "뉴", "にょ": "뇨",
            "ひゃ": "햐", "ひゅ": "휴", "ひょ": "효",
            "みゃ": "먀", "みゅ": "뮤", "みょ": "묘",
            "りゃ": "랴", "りゅ": "류", "りょ": "료",
            "ぎゃ": "갸", "ぎゅ": "규", "ぎょ": "교",
            "じゃ": "쟈", "じゅ": "쥬", "じょ": "죠",
            "びゃ": "뱌", "びゅ": "뷰", "びょ": "뵤",
            "ぴゃ": "퍄", "ぴゅ": "퓨", "ぴょ": "표"
        }
    };

    let currentList = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;

    const inputField = document.getElementById('answer-input');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');

    function startQuiz(type) {
        const source = data[type];
        currentList = Object.keys(source).map(key => ({ q: key, a: source[key] }));
        currentList.sort(() => Math.random() - 0.5);

        currentIndex = 0;
        score = 0;
        
        document.getElementById('total-idx-display').innerText = currentList.length;
        document.getElementById('score').innerText = score;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= currentList.length) {
            showResult();
            return;
        }
        
        const item = currentList[currentIndex];
        document.getElementById('char-display').innerText = item.q;
        document.getElementById('current-idx-display').innerText = currentIndex + 1;
        
        // 입력창 초기화 및 보이기
        inputField.value = "";
        inputField.style.display = "inline-block";
        
        // 피드백 및 다음 버튼 숨기기
        feedback.innerText = "";
        nextBtn.style.display = "none";
        
        answered = false;
        
        // 약간의 지연 후 포커스 (브라우저 버그 방지)
        setTimeout(() => inputField.focus(), 50);
    }

    function checkAnswer() {
        if (answered) return;

        const input = inputField.value.trim();
        if (!input) return;

        const correct = currentList[currentIndex].a;
        answered = true;

        // 입력창을 즉시 숨겨서 엔터 중복 입력을 막음
        inputField.style.display = "none";

        if (input === correct) {
            feedback.innerText = "정답";
            feedback.style.color = "var(--success)";
            score++;
            document.getElementById('score').innerText = score;
            nextBtn.innerText = "다음으로";
        } else {
            feedback.innerText = `오답 정답 : [${correct}]`;
            feedback.style.color = "var(--error)";
            nextBtn.innerText = "다음 문제 (Enter)";
        }
        
        // 다음 버튼 표시
        nextBtn.style.display = "block";
    }

    function handleNext() {
        if (!answered) return;
        currentIndex++;
        showQuestion();
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${currentList.length}`;
    }

    function resetGame() {
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('main-menu').style.display = 'block';
    }

    // 엔터 키 처리 로직 통합
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            // 퀴즈 화면이 아닐 때는 작동 안 함
            if (document.getElementById('quiz-area').style.display !== 'block') return;

            if (!answered) {
                // 아직 답을 안 적었다면 정답 체크
                checkAnswer();
            } else {
                // 이미 답을 체크해서 다음 버튼이 떠 있다면 다음으로 이동
                handleNext();
            }
        }
    });
</script>

</body>
</html>
