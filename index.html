<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>히라가나어 외우기</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #f8f9fa;
            --white: #ffffff;
            --text: #2d3436;
            --success: #00b894;
            --error: #d63031;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--white);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 450px; /* 크기를 다시 키웠습니다 */
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .score-text { font-size: 1.2rem; font-weight: bold; color: var(--primary); }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--secondary);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: var(--primary); transform: translateY(-2px); }

        /* 퀴즈 및 결과 영역 */
        #quiz-area, #result-area { display: none; }

        #char-display {
            font-size: 7rem; /* 글자 크기 확대 */
            margin: 20px 0;
            font-weight: bold;
            color: var(--text);
        }

        input[type="text"] {
            width: 85%;
            padding: 15px;
            border: 3px solid #eee;
            border-radius: 15px;
            font-size: 1.5rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        #feedback {
            font-size: 1.3rem;
            font-weight: bold;
            min-height: 1.6rem;
            margin-bottom: 20px;
        }

        .action-btn { background: var(--primary); width: 100%; }

        .result-title { font-size: 1.8rem; margin-bottom: 20px; color: var(--text); }
    </style>
</head>
<body>

<div class="container">
    <div id="main-menu">
        <h1 style="color: var(--primary); margin-top: 0;">히라가나어 외우기</h1>
        <p>학습할 유형을 선택하세요</p>
        <div class="menu-grid">
            <button onclick="startQuiz('seion')">청음</button>
            <button onclick="startQuiz('takuon')">탁음</button>
            <button onclick="startQuiz('hantakuon')">반탁음</button>
            <button onclick="startQuiz('youm')">요음</button>
        </div>
    </div>

    <div id="quiz-area">
        <div class="header">
            <span id="quiz-type-name" style="font-weight: bold;">진행 중...</span>
            <div class="score-text">맞춘 개수: <span id="score">0</span></div>
        </div>
        <div id="char-display">?</div>
        <input type="text" id="answer-input" placeholder="발음 입력" autocomplete="off">
        <div id="feedback"></div>
        <button id="next-btn" class="action-btn" style="display:none;" onclick="handleNext()">다음 (Enter/Space)</button>
    </div>

    <div id="result-area">
        <div class="result-title">완료</div>
        <p style="font-size: 1.2rem;">최종 점수: <span id="final-score" style="font-weight:bold; color:var(--primary);">0</span></p>
        <button class="action-btn" onclick="resetGame()">다시하기 (처음으로)</button>
    </div>
</div>

<script>
    const data = {
        seion: { "あ": "아", "い": "이", "う": "우", "え": "에", "お": "오", "か": "카", "き": "키", "く": "쿠", "け": "케", "こ": "코", "さ": "사", "し": "시", "す": "스", "せ": "세", "そ": "소", "た": "타", "ち": "치", "つ": "츠", "て": "테", "도": "토" }, // 양 조절을 위해 일부 축소 (실제론 다 넣으셔도 됩니다)
        takuon: { "가": "가", "ぎ": "기", "ぐ": "구", "げ": "게", "ご": "고", "ざ": "자", "じ": "지", "ず": "즈", "ぜ": "제", "ぞ": "조", "だ": "다", "ぢ": "지", "づ": "즈", "で": "데", "ど": "도", "ば": "바", "び": "비", "ぶ": "부", "べ": "베", "ぼ": "보" },
        hantakuon: { "ぱ": "파", "ぴ": "피", "ぷ": "푸", "ぺ": "페", "ぽ": "포" },
        youm: { "きゃ": "캬", "きゅ": "큐", "きょ": "쿄", "しゃ": "샤", "しゅ": "슈", "しょ": "쇼", "ちゃ": "챠", "ちゅ": "츄", "ちょ": "쵸" }
    };

    let currentList = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;

    const inputField = document.getElementById('answer-input');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');

    function startQuiz(type) {
        // 데이터 준비 (무작위 섞기)
        const source = data[type];
        currentList = Object.keys(source).map(key => ({ q: key, a: source[key] }));
        currentList.sort(() => Math.random() - 0.5);

        currentIndex = 0;
        score = 0;
        
        document.getElementById('score').innerText = score;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= currentList.length) {
            showResult();
            return;
        }
        
        const item = currentList[currentIndex];
        document.getElementById('char-display').innerText = item.q;
        inputField.value = "";
        inputField.style.display = "inline-block";
        feedback.innerText = "";
        nextBtn.style.display = "none";
        answered = false;
        inputField.focus();
    }

    function checkAnswer() {
        const input = inputField.value.trim();
        if (!input) return;

        const correct = currentList[currentIndex].a;
        answered = true;

        if (input === correct) {
            feedback.innerText = "정답";
            feedback.style.color = "var(--success)";
            score++;
            document.getElementById('score').innerText = score;
            setTimeout(handleNext, 600); // 정답이면 자동 넘어가기
        } else {
            feedback.innerText = `오답 정답 : [${correct}]`;
            feedback.style.color = "var(--error)";
            inputField.style.display = "none";
            nextBtn.style.display = "block";
        }
    }

    function handleNext() {
        currentIndex++;
        showQuestion();
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${currentList.length}`;
    }

    function resetGame() {
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('main-menu').style.display = 'block';
    }

    // 키보드 이벤트 (엔터, 스페이스)
    inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            if (!answered) checkAnswer();
        }
    });

    window.addEventListener('keydown', (e) => {
        // 오답 화면에서 버튼이 떠있을 때 엔터/스페이스로 넘어가기
        if ((e.key === 'Enter' || e.key === ' ') && nextBtn.style.display === 'block') {
            handleNext();
        }
    });
</script>

</body>
</html>
