<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>히라가나 외우기</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #f5f6fa;
            --white: #ffffff;
            --text: #2f3640;
            --wrong: #e84118;
            --correct: #4cd137;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 380px; /* 창 크기를 적절하게 고정 */
            text-align: center;
        }

        /* 상단 스코어보드 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .score-text { font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        button.mode-btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #eee;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button.mode-btn:hover { background: var(--primary); color: white; }

        /* 퀴즈 영역 */
        #quiz-area { display: none; }

        #char-display {
            font-size: 5rem; /* 크기 적절히 축소 */
            margin: 15px 0;
            font-weight: bold;
            color: var(--text);
        }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
        }

        #feedback {
            margin: 15px 0;
            min-height: 1.5rem;
            font-weight: bold;
        }

        .next-btn {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none; /* 기본적으로 숨김 */
            margin: 0 auto;
        }

        .info { font-size: 0.8rem; color: #999; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span style="font-weight: bold;">히라가나 외우기</span>
        <div class="score-text">맞춘 개수: <span id="score">0</span></div>
    </div>

    <div class="menu-grid">
        <button class="mode-btn" onclick="startQuiz('seion')">청음</button>
        <button class="mode-btn" onclick="startQuiz('takuon')">탁음</button>
        <button class="mode-btn" onclick="startQuiz('hantakuon')">반탁음</button>
        <button class="mode-btn" onclick="startQuiz('youm')">요음</button>
    </div>

    <div id="quiz-area">
        <div id="char-display">?</div>
        <input type="text" id="answer-input" placeholder="발음 입력" autocomplete="off">
        <div id="feedback"></div>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">다음 문제로</button>
    </div>
</div>

<script>
    const data = {
        seion: { "あ": "아", "い": "이", "う": "우", "え": "에", "お": "오", "か": "카", "き": "키", "く": "쿠", "け": "케", "こ": "코", "さ": "사", "し": "시", "す": "스", "せ": "세", "そ": "소", "た": "타", "ち": "치", "つ": "츠", "て": "테", "と": "토", "나": "나", "に": "니", "ぬ": "누", "ね": "네", "の": "노", "は": "하", "ひ": "히", "ふ": "후", "へ": "헤", "ほ": "호", "ま": "마", "み": "미", "む": "무", "め": "메", "も": "모", "야": "야", "ゆ": "유", "よ": "요", "ら": "라", "り": "리", "る": "루", "れ": "레", "ろ": "로", "わ": "와", "を": "오", "ん": "응" },
        takuon: { "が": "가", "ぎ": "기", "ぐ": "구", "げ": "게", "ご": "고", "ざ": "자", "じ": "지", "ず": "즈", "ぜ": "제", "ぞ": "조", "だ": "다", "ぢ": "지", "づ": "즈", "で": "데", "ど": "도", "ば": "바", "び": "비", "부": "부", "べ": "베", "ぼ": "보" },
        hantakuon: { "ぱ": "파", "ぴ": "피", "ぷ": "푸", "ぺ": "페", "ぽ": "포" },
        youm: { "きゃ": "캬", "きゅ": "큐", "きょ": "쿄", "しゃ": "샤", "しゅ": "슈", "しょ": "쇼", "ちゃ": "챠", "ちゅ": "츄", "ちょ": "쵸" }
    };

    let currentData = {};
    let currentKey = "";
    let score = 0;
    let answered = false; // 현재 문제에 답을 했는지 체크

    const inputField = document.getElementById('answer-input');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');

    function startQuiz(type) {
        currentData = data[type];
        score = 0;
        updateScore();
        document.getElementById('quiz-area').style.display = 'block';
        nextQuestion();
    }

    function updateScore() {
        document.getElementById('score').innerText = score;
    }

    function nextQuestion() {
        const keys = Object.keys(currentData);
        currentKey = keys[Math.floor(Math.random() * keys.length)];
        document.getElementById('char-display').innerText = currentKey;
        inputField.value = "";
        inputField.style.display = "inline-block";
        feedback.innerText = "";
        nextBtn.style.display = "none";
        answered = false;
        inputField.focus();
    }

    inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            if (!answered) {
                checkAnswer();
            } else {
                nextQuestion();
            }
        }
    });

    function checkAnswer() {
        const input = inputField.value.trim();
        if (!input) return;

        if (input === currentData[currentKey]) {
            feedback.innerText = "정답";
            feedback.style.color = "var(--correct)";
            score++;
            updateScore();
            // 정답이면 0.6초 후 자동으로 다음으로 (성급함 방지)
            answered = true;
            setTimeout(nextQuestion, 600);
        } else {
            feedback.innerText = `오답  정답 : [${currentData[currentKey]}]`;
            feedback.style.color = "var(--wrong)";
            answered = true;
            inputField.style.display = "none"; // 입력창 잠시 숨김
            nextBtn.style.display = "block"; // 다음 버튼 등장
        }
    }
</script>

</body>
</html>
